name: Build Windows EXE for CAW

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖（根据你的脚本实际使用的库调整）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install openpyxl
          pip install pillow
          # 如果使用 tkinter，它已随 Python 标准库安装，无需额外添加
          # 如有其他依赖，请在此添加

      # 4. 打包为单个 EXE 文件
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --console --name CAW_Report_Auto "Auto MBO_PBO For CAW.py"

      # 5. 上传构建产物（Artifact）
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAW_Report_Auto_Windows
          path: dist/CAW_Report_Auto.exe
